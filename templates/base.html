<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}CodePulse{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a href="{{ url_for('main.index') }}" class="nav-brand">
      <span class="brand-icon">⚡</span> CodePulse
    </a>
    <div class="nav-links">
      <a href="{{ url_for('main.index') }}">Analyze</a>
      <a href="{{ url_for('main.history') }}">History</a>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Built with Flask · SQLite · Groq AI · Chart.js &nbsp;|&nbsp; <strong>CodePulse</strong></p>
  </footer>
</body>
</html>
